<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Dark Mode Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="../icons/icon.png" alt="Dark Mode Logo">
        <h1>Dark Mode</h1>
      </div>
      <label class="switch" title="全局开关">
        <input type="checkbox" id="global-toggle">
        <span class="slider round"></span>
      </label>
    </header>

    <div class="section mode-section">
      <h3>运行模式</h3>
      <div class="segmented-control">
        <input type="radio" name="list-mode" id="mode-blacklist" value="blacklist" checked>
        <label for="mode-blacklist">全局开启<br><small>(排除列表)</small></label>
        
        <input type="radio" name="list-mode" id="mode-whitelist" value="whitelist">
        <label for="mode-whitelist">仅限列表<br><small>(白名单)</small></label>
      </div>
    </div>

    <div class="section list-section">
      <div class="list-header">
        <h3>当前网站</h3>
        <button id="add-current-btn" class="btn btn-primary">加入列表</button>
      </div>
      <p id="current-site" class="current-site-text">获取中...</p>
      
      <h3 class="mt-16">域名列表</h3>
      <div class="add-custom">
        <input type="text" id="custom-domain" placeholder="例如: example.com" aria-label="自定义域名">
        <button id="add-custom-btn" class="btn btn-secondary">添加</button>
      </div>
      <ul id="domain-list">
        <!-- Domains injected by JS -->
      </ul>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
