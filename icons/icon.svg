<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 白色底圈 -->
  <circle cx="50" cy="50" r="48" fill="#FFFFFF" />
  
  <!-- 黑色的半边和S型曲线 -->
  <!-- 路径说明：从顶部(50,2)沿外圈顺时针画到(50,98)，然后以半径24顺时针画圆弧到中心(50,50)（向左凸出），最后以半径24逆时针画圆弧回到顶部(50,2)（向右凸出） -->
  <path d="M 50 2 A 48 48 0 0 1 50 98 A 24 24 0 0 1 50 50 A 24 24 0 0 0 50 2" fill="#000000" />
  
  <!-- 顶部的黑点 (在白色的大头部分) -->
  <circle cx="50" cy="26" r="8" fill="#000000" />
  
  <!-- 底部的白点 (在黑色的大头部分) -->
  <circle cx="50" cy="74" r="8" fill="#FFFFFF" />
</svg>
